name: Deploy Cloudflare Worker

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Upload Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          set -e
          echo "${{ secrets.GEMINI_API_KEY }}" | npx wrangler secret put GEMINI_API_KEY --env production
          echo "${{ secrets.JWT_SECRET }}" | npx wrangler secret put JWT_SECRET --env production
          echo "${{ secrets.GOOGLE_CLIENT_EMAIL }}" | npx wrangler secret put GOOGLE_CLIENT_EMAIL --env production
          printf '%s' "${{ secrets.GOOGLE_PRIVATE_KEY }}" | npx wrangler secret put GOOGLE_PRIVATE_KEY --env production
          echo "${{ secrets.GOOGLE_SPREADSHEET_ID }}" | npx wrangler secret put GOOGLE_SPREADSHEET_ID --env production

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: npx wrangler deploy --env production
